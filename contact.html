<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — The Arts Wellness Lab</title>
<meta name="description" content="Subscribe to The Arts Wellness Lab mailing list and get in touch with our team.">
<meta name="theme-color" content="#0f766e">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
/* === Tokens (indigo accent theme) === */
:root {
  --indigo: #0f766e;
  --indigo-dark: #134e4a;
  --bg: #ffffff;
  --bg-alt: #f6f4f0;
  --ink: #1d1d1f;
  --ink-soft: #4d4d52;
  --rule: #e4ded4;
  --max: 1140px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3 { font-family: 'Fraunces', Georgia, serif; margin: 0 0 0.4em; line-height: 1.08; font-weight: 600; letter-spacing: -0.01em; }
h1 { font-size: clamp(2.6rem, 6vw, 4.6rem); font-weight: 500; }
h2 { font-size: clamp(1.9rem, 4vw, 2.9rem); }
h3 { font-size: 1.25rem; }
p { margin: 0 0 1em; }
a { color: inherit; }
.mono {
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em;
  text-transform: uppercase; font-size: 0.74rem; color: var(--indigo); font-weight: 500;
}
.sr-only { position: absolute; left: -9999px; }

/* === Layout helpers === */
.wrap { max-width: var(--max); margin: 0 auto; padding-left: 1.6rem; padding-right: 1.6rem; }
section { padding: 6rem 0; }

/* === Header === */
header {
  background: var(--bg);
  color: var(--ink);
  border-bottom: 1px solid var(--rule);
  position: sticky; top: 0; z-index: 10;
}
.brandbar { height: 5px; background: var(--indigo); }
.nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.15rem 1.6rem; max-width: var(--max); margin: 0 auto;
}
.logo { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 1.15rem; line-height: 1.02; text-transform: uppercase; letter-spacing: 0.005em; text-decoration: none; color: var(--ink); display: flex; flex-direction: column; }
.nav-links { display: flex; gap: 1.8rem; align-items: center; }
.nav-links a { text-decoration: none; color: var(--ink-soft); font-size: 0.92rem; font-weight: 500; padding-bottom: 2px; border-bottom: 2px solid transparent; }
.nav-links a:hover, .nav-links a.active { color: var(--indigo); border-bottom-color: var(--indigo); }
.nav-toggle { display: none; background: none; border: 0; padding: 0.4rem; margin: -0.4rem 0; cursor: pointer; color: var(--ink); }
.nav-toggle svg { width: 1.7rem; height: 1.7rem; display: block; }

/* === Newsletter (primary) === */
.cta { background: var(--indigo); color: #fff; text-align: center; }
.cta .mono { color: #5eead4; display: block; margin-bottom: 1rem; }
.cta h2 { color: #fff; }
.cta p { max-width: 46ch; margin: 0 auto 1.8rem; color: rgba(255,255,255,0.88); }
.newsletter-form { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; max-width: 360px; margin: 0 auto; }
.newsletter-form .full { grid-column: 1 / -1; }
.newsletter-form input {
  width: 100%; padding: 0.85rem 1rem; border: 1px solid rgba(255,255,255,0.45);
  background: rgba(255,255,255,0.08); color: #fff; border-radius: 2px; font-size: 1rem; font-family: inherit;
}
.newsletter-form input::placeholder { color: rgba(255,255,255,0.6); }
.newsletter-form button {
  width: 100%; padding: 0.85rem 1.6rem; border: none; border-radius: 2px; background: #fff;
  color: var(--indigo); font-weight: 600; cursor: pointer; font-size: 1rem; font-family: inherit;
}
.newsletter-form button:hover { background: #5eead4; }
.form-message { margin-top: 1rem; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; min-height: 1.2em; color: #5eead4; }

/* === Contact details === */
.contact .mono { display: block; margin-bottom: 0.9rem; }
.contact h2 { max-width: 18ch; }
.contact-grid { display: grid; gap: 0; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-top: 2.5rem; border-top: 1px solid var(--rule); }
.contact-grid > div { padding: 1.8rem 1.5rem 1.8rem 0; border-bottom: 1px solid var(--rule); }
.contact-grid .mono { display: block; margin-bottom: 0.5rem; }
.contact-grid .value { font-family: 'Fraunces', Georgia, serif; font-size: 1.4rem; color: var(--ink); }
.contact-grid a.value { text-decoration: none; }
.contact-grid a.value:hover { color: var(--indigo); }
.placeholder-note { font-size: 0.82rem; color: var(--ink-soft); margin-top: 0.35rem; font-style: italic; }

/* === Footer === */
footer { background: var(--ink); color: rgba(255,255,255,0.7); padding: 3rem 0; font-size: 0.85rem; }
footer .wrap { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; align-items: center; }
footer .mono { color: rgba(255,255,255,0.55); }
footer a { color: rgba(255,255,255,0.7); text-decoration: none; }
footer a:hover { color: #fff; }

@media (max-width: 700px) {
  .nav-toggle { display: inline-flex; align-items: center; }
  .nav-links {
    display: none; position: absolute; top: 100%; left: 0; right: 0;
    flex-direction: column; align-items: stretch; gap: 0;
    background: var(--bg); border-bottom: 1px solid var(--rule);
    padding: 0.4rem 1.6rem 1rem; box-shadow: 0 8px 16px rgba(0,0,0,0.06);
  }
  .nav-links.open { display: flex; }
  .nav-links a { padding: 0.8rem 0; font-size: 1rem; border-bottom: 1px solid var(--rule); }
  .nav-links a:last-child { border-bottom: none; }
  section { padding: 4rem 0; }
}

@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }
</style>
</head>
<body>

<header>
  <div class="brandbar"></div>
  <nav class="nav">
    <a href="index.html" class="logo">
      <span>Arts</span><span>Wellness</span><span>Lab</span>
    </a>
    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="nav-links" id="nav-links">
      <a href="index.html">Mission</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </div>
  </nav>
</header>

<section class="contact wrap">
  <h2>Stay in touch</h2>
  <p>Updates on classes, research, programs, and ways to collaborate.</p>
  <div class="contact-grid">
    <div>
      <a class="value" href="mailto:neuroartslabnyc@gmail.com">neuroartslabnyc@gmail.com</a>
    </div>
  </div>
</section>

<footer>
  <div class="wrap">
    <span>© 2026 The Arts Wellness Lab · Greenwich Village, New York</span>
  </div>
</footer>

<script>
(function () {
  var toggle = document.querySelector('.nav-toggle');
  var links = document.getElementById('nav-links');
  if (toggle && links) {
    toggle.addEventListener('click', function () {
      var open = links.classList.toggle('open');
      toggle.setAttribute('aria-expanded', open);
    });
  }
})();

document.querySelectorAll('.newsletter-form').forEach(function (form) {
  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var msg = form.nextElementSibling;
    fetch('/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(new FormData(form)).toString()
    })
      .then(function () {
        msg.textContent = "Thanks — you're on the list. Watch your inbox.";
        form.reset();
      })
      .catch(function () {
        msg.textContent = "Something went wrong — please try again.";
      });
  });
});
</script>
</body>
</html>
